<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>食堂大冒险 | 掌上版</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/pixel-line/96/hamburger.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        :root { --gb-dark: #2d3322; --gb-light: #f4f1de; --gb-accent: #e07a5f; --gb-green: #81b29a; --gb-yellow: #f2cc8f; }
        
        /* 核心打磨：强制一屏，处理刘海区 */
        body { 
            background-color: var(--gb-light); color: var(--gb-dark); font-family: 'ZCOOL KuaiLe', cursive; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 1rem 0 1rem; /* 底部padding交由nav处理 */
        }
        
        .gb-panel { border: 4px solid var(--gb-dark); background: #fff; box-shadow: 4px 4px 0px rgba(0,0,0,0.1), inset -2px -2px 0px var(--gb-yellow); }
        .gb-btn-main { background: var(--gb-accent); color: white; border: 4px solid var(--gb-dark); box-shadow: 0 5px 0 var(--gb-dark); text-shadow: 1px 1px 0 rgba(0,0,0,0.2); transition: all 0.05s; }
        .gb-btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--gb-dark); }
        
        /* 1. 响应式转盘：小屏自动缩小 */
        .wheel-outer { 
            width: min(65vw, 240px); height: min(65vw, 240px); 
            border-radius: 50%; border: 6px solid var(--gb-dark); background: var(--gb-dark); position: relative; 
            box-shadow: 0 8px 0px rgba(0,0,0,0.15);
        }
        .wheel-main { position: absolute; inset: 6px; border-radius: 50%; border: 3px solid var(--gb-dark); transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        
        /* 2. 弹窗适配打磨 */
        .modal-content { 
            width: 90%; max-width: 320px; max-height: 85vh; /* 限制弹窗高度 */
            overflow-y: auto; /* 内容过多可滚动 */
        }
        
        .tag-checkbox { display: none; }
        .tag-label { display: inline-block; padding: 3px 7px; margin: 2px; border: 2px solid var(--gb-dark); font-size: 11px; background: #fff; cursor: pointer; }
        .tag-checkbox:checked + .tag-label { background: var(--gb-green); box-shadow: inset 2px 2px 0 rgba(0,0,0,0.2); }
        .scan-line { position: absolute; width: 100%; height: 4px; background: var(--gb-accent); top: 0; animation: scanning 2s linear infinite; }
        @keyframes scanning { from { top: 0; } to { top: 100%; } }
        
        #food-list::-webkit-scrollbar, .modal-content::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="animate__animated animate__fadeIn">

    <header class="pt-2 mb-2">
        <div class="gb-panel p-2 flex justify-between items-center bg-white text-xs">
            <div class="flex flex-col"><span class="text-[10px] opacity-60 italic">STATS</span><div class="flex items-center gap-1"><span>🍖</span><div class="w-16 h-2.5 border-2 border-dark bg-gray-100 overflow-hidden"><div id="hp-bar" class="h-full bg-green-400 w-1/5"></div></div></div></div>
            <div class="text-right flex items-center gap-1"><div class="bg-red-500 text-white text-[10px] px-1 border border-dark">纠结: <span id="reject-val">0</span>/3</div><span class="font-bold">LV.99</span></div>
        </div>
    </header>

    <main id="page-home" class="flex-1 flex flex-col justify-between min-h-0 py-2">
        <div class="flex-1 flex items-center justify-center relative min-h-0">
            <div class="absolute -top-3 left-1/2 -translate-x-1/2 z-20 text-3xl animate-bounce">📍</div>
            <div class="wheel-outer"><div id="wheel" class="wheel-main overflow-hidden"></div></div>
        </div>
        
        <div id="result-box" class="h-14 mb-2 hidden animate__animated animate__jackInTheBox flex items-center justify-center">
            <div class="gb-panel px-5 py-1 bg-yellow-100 text-center">
                <p class="text-[9px] opacity-60">✨ 今日灵感 ✨</p>
                <h2 id="result-text" class="text-base font-bold text-red-600 italic tracking-tight"></h2>
            </div>
        </div>
        
        <button onclick="handleDecide()" id="main-btn" class="gb-btn-main w-full py-4 text-lg font-bold italic mb-2 rounded-none">🕹️ 判定启动 !</button>
    </main>

    <main id="page-list" class="flex-1 hidden flex flex-col overflow-hidden min-h-0">
        <div class="flex justify-between items-center mb-2 px-1"><h2 class="text-xl font-bold italic">📜 秘录图鉴</h2><button onclick="openModal()" class="gb-panel bg-green-400 px-3 py-1 text-xs font-bold shadow-none active:scale-95">＋ 录入</button></div>
        <div id="food-list" class="flex-1 overflow-y-auto space-y-2 pb-4"></div>
    </main>

    <nav class="flex gap-2 h-14 pt-1 pb-safe mb-2">
        <button onclick="nav('home')" id="nav-home" class="flex-1 gb-panel font-bold text-center bg-white">探索 🏰</button>
        <button onclick="nav('list')" id="nav-list" class="flex-1 gb-panel font-bold text-center bg-gray-200 text-gray-600">图鉴 📜</button>
    </nav>

    <div id="add-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="gb-panel modal-content animate__animated animate__zoomIn p-5">
            <h3 class="font-bold mb-3 text-center">📝 录入新灵感</h3>
            
            <div class="space-y-3 mb-4">
                <input id="new-name" type="text" placeholder="美味名称..." class="w-full border-4 border-dark p-3 outline-none font-bold text-sm placeholder:text-gray-300">
                <button onclick="triggerCamera()" class="w-full gb-panel bg-blue-400 p-3 shadow-none flex items-center justify-center gap-2 active:scale-95">
                    <span>📷</span> 拍照识别招牌
                </button>
            </div>
            
            <p class="text-[10px] font-bold mb-1.5 opacity-60">口味属性 (ATTRIBUTES):</p>
            <div id="tag-container" class="flex flex-wrap mb-5"></div>
            
            <div class="flex gap-2 pt-2 border-t-2 border-dashed border-dark/20">
                <button onclick="saveFood()" class="flex-1 gb-btn-main py-3 bg-green-500 font-bold text-sm">存入灵感</button>
                <button onclick="closeModal()" class="flex-1 py-3 text-gray-500 gb-panel border-none shadow-none bg-gray-100 text-sm">取消</button>
            </div>
        </div>
    </div>
    
    <div id="ai-loading" class="fixed inset-0 bg-black/90 hidden z-[60] flex flex-col items-center justify-center text-white p-10"><div class="w-48 h-48 gb-panel relative overflow-hidden bg-gray-800"><img id="preview-img" class="w-full h-full object-cover opacity-60"><div class="scan-line"></div></div><p class="mt-5 text-xs animate-pulse tracking-widest">图像解析中...</p></div>
    <input type="file" id="camera-file" accept="image/*" capture="camera" class="hidden" onchange="processPhoto(event)">

    <script>
        const RETRO_PALETTE=['#f4adac','#98d1df','#bedcba','#f9e8b7','#cecae4'];
        let foods=JSON.parse(localStorage.getItem('my_food_v6'))||[{name:"螺蛳粉",tags:["🌶️ 辣"]},{name:"萨莉亚",tags:["🍟 快餐"]},{name:"重庆火锅",tags:["🔥 热"]}];
        let rotation=0,isRunning=false,rejects=0;
        
        const flavors=["🍋 酸","🍯 甜","🌶️ 辣","🧂 咸","🍗 炸","🥗 轻"];
        document.getElementById('tag-container').innerHTML=flavors.map(f=>`<input type="checkbox" id="t-${f}" class="tag-checkbox" value="${f}"><label for="t-${f}" class="tag-label transition-all">${f}</label>`).join('');

        function updateWheel(){
            const wheel=document.getElementById('wheel'); if(!foods.length){wheel.innerHTML=""; wheel.style.background="#eee"; return;}
            const step=360/foods.length;
            wheel.style.background=`conic-gradient(${foods.map((f,i)=>`${RETRO_PALETTE[i%5]} ${i*step}deg ${(i+1)*step}deg`).join(',')})`;
            wheel.innerHTML=foods.map((f,i)=>`<div style="position:absolute;width:100%;height:100%;transform:rotate(${i*step+step/2}deg);text-align:center;padding-top:10px;color:#fff;font-weight:bold;font-size:10px;text-shadow:1px 1px 0 #000;line-height:1.2;overflow:hidden;max-height:1.2rem;">${f.name}</div>`).join('');
        }
        function handleDecide(){
            if(isRunning||!foods.length)return; isRunning=true;
            document.getElementById('result-box').classList.add('hidden');
            document.getElementById('main-btn').style.opacity="0.6";
            rejects++; document.getElementById('reject-val').innerText=rejects;
            if(rejects>3){alert("别纠结了！勇者需冷静片刻... 🚰"); rejects=0; isRunning=false; document.getElementById('main-btn').style.opacity="1"; return;}
            rotation+=(2160+Math.floor(Math.random()*1440));
            document.getElementById('wheel').style.transform=`rotate(${rotation}deg)`;
            setTimeout(()=>{
                isRunning=false; document.getElementById('main-btn').style.opacity="1";
                const idx=Math.floor(((360-(rotation%360))%360)/(360/foods.length));
                document.getElementById('result-text').innerText=foods[idx].name;
                document.getElementById('result-box').classList.remove('hidden');
                document.getElementById('hp-bar').style.width="100%";
            },4000);
        }
        function renderList(){
            const list=document.getElementById('food-list');
            if(foods.length===0){list.innerHTML=`<div class="py-16 text-center opacity-30 text-xs italic">书架空空如也...</div>`; return;}
            list.innerHTML=foods.map((f,i)=>`<div class="gb-panel p-2 flex justify-between items-center bg-white mb-2 shadow-none animate__animated animate__fadeInUp" style="animation-delay:${i*0.05}s"><div><div class="font-bold text-sm tracking-tight">${f.name}</div><div class="flex gap-1">${f.tags.map(t=>`<span class="text-[9px] border border-dark px-1">${t}</span>`).join('')}</div></div><button onclick="deleteFood(${i})" class="text-red-500 text-xs font-bold px-1 active:scale-95">丟弃</button></div>`).join('');
        }
        function deleteFood(i){if(confirm("丢弃灵感？")){foods.splice(i,1); saveAndSync();}}
        function saveAndSync(){localStorage.setItem('my_food_v6',JSON.stringify(foods)); updateWheel(); if(!document.getElementById('page-list').classList.contains('hidden'))renderList();}
        function triggerCamera(){document.getElementById('camera-file').click();}
        function processPhoto(e){
            if(!e.target.files.length) return;
            const loading=document.getElementById('ai-loading');
            document.getElementById('preview-img').src=URL.createObjectURL(e.target.files[0]);
            loading.classList.remove('hidden');
            setTimeout(()=>{ loading.classList.add('hidden'); document.getElementById('new-name').value="AI发现的美食"+Math.floor(Math.random()*99); },2500);
        }
        function saveFood(){
            const name=document.getElementById('new-name').value;
            const tags=Array.from(document.querySelectorAll('.tag-checkbox:checked')).map(cb=>cb.value);
            if(name){foods.unshift({name,tags}); saveAndSync(); closeModal(); document.getElementById('new-name').value=""; document.querySelectorAll('.tag-checkbox').forEach(cb=>cb.checked=false);}
        }
        function nav(p){
            document.getElementById('page-home').classList.toggle('hidden',p!=='home');
            document.getElementById('page-list').classList.toggle('hidden',p!=='list');
            if(p==='list')renderList();
            document.getElementById('nav-home').classList.toggle('bg-white',p==='home');
            document.getElementById('nav-list').classList.toggle('bg-white',p==='list');
        }
        function openModal(){document.getElementById('add-modal').classList.remove('hidden'); document.getElementById('new-name').focus();}
        function closeModal(){document.getElementById('add-modal').classList.add('hidden');}
        window.onload=updateWheel;
    </script>
</body>
</html>
